
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gold Signal Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: #050508;
            color: #e8e8e8;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        .app { height: 100%; display: flex; flex-direction: column; background: #050508; }
        .status-bar {
            height: 44px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; font-size: 14px; font-weight: 700; color: #fff; padding-top: 12px;
        }
        .app-bar {
            height: 56px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 16px; border-bottom: 1px solid rgba(255, 215, 0, 0.2);
        }
        .app-title { font-size: 20px; font-weight: 900; color: #FFD700; }
        .app-subtitle { font-size: 11px; color: #888; }
        .content {
            flex: 1; overflow-y: auto; padding: 12px; padding-bottom: 90px;
        }
        .content::-webkit-scrollbar { width: 0; }

        /* شريط الأخبار */
        .news-ticker-bar {
            background: linear-gradient(90deg, rgba(255,215,0,0.08), rgba(255,215,0,0.03));
            border-bottom: 1px solid rgba(255,215,0,0.2);
            padding: 8px 0; overflow: hidden; white-space: nowrap; position: relative;
        }
        .news-ticker-bar::before {
            content: '📰'; position: absolute; left: 10px; top: 50%;
            transform: translateY(-50%); z-index: 2; font-size: 14px;
        }
        .news-ticker-track {
            display: inline-block; animation: ticker 25s linear infinite;
            padding-left: 40px; font-size: 12px; color: #888; font-weight: 500;
        }
        .news-ticker-track span { margin-right: 40px; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* أدوات السوق */
        .market-toolbar {
            display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
            margin: 8px 0 10px 0; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 6px 12px;
        }
        .market-label {
            font-size: 13px; font-weight: 700; color: #888; cursor: pointer;
            padding: 4px 8px; border-radius: 6px; transition: all 0.2s;
        }
        .market-label.active { color: #FFD700; background: rgba(255,215,0,0.15); }
        .market-label:active { transform: scale(0.95); }
        .search-input {
            flex: 1; min-width: 120px; background: #050508;
            border: 1px solid rgba(255,215,0,0.2); border-radius: 8px;
            padding: 6px 12px; color: #fff; font-size: 13px; outline: none;
        }
        .search-input::placeholder { color: #555; }
        .search-btn {
            background: #FFD700; border: none; color: #000; padding: 6px 16px;
            border-radius: 8px; font-weight: 700; cursor: pointer;
        }
        .search-btn:active { transform: scale(0.95); }

        /* ========== المستطيل السحري (بنر واحد مطابق للشارت) ========== */
        .price-box {
            height: 56px; margin-bottom: 10px; background: rgba(255,255,255,0.03);
            border-radius: 12px; border: 1px solid rgba(255,215,0,0.2);
            overflow: hidden; /* هذا أهم شي عشان يخفي أي كتابة زايدة */
            display: flex; align-items: center; justify-content: center;
        }
        .price-box iframe {
            width: 100%; height: 100%; border: none; display: block;
        }

        /* الشارت */
        .chart-box {
            background: rgba(255,255,255,0.03); border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.06); overflow: hidden; padding: 6px; flex: 1;
        }
        .chart-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 4px 8px; flex-wrap: wrap; gap: 4px;
        }
        .chart-title { font-size: 14px; font-weight: 800; color: #FFD700; }
        .timeframes { display: flex; gap: 4px; flex-wrap: wrap; }
        .tf {
            padding: 4px 10px; border-radius: 8px; background: transparent;
            border: 1px solid transparent; color: #555; font-size: 11px;
            font-weight: 700; cursor: pointer; transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .tf.active { background: rgba(255,215,0,0.15); border-color: rgba(255,215,0,0.2); color: #FFD700; }
        .tf:active { transform: scale(0.95); }
        .chart-area {
            height: calc(100vh - 420px); min-height: 300px; background: #06060a;
            border-radius: 12px; overflow: hidden; position: relative;
        }
        .chart-area iframe { width: 100%; height: 100%; border: none; border-radius: 12px; }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: 72px;
            display: flex; justify-content: space-around; align-items: center;
            background: rgba(5,5,8,0.95); backdrop-filter: blur(24px);
            border-top: 1px solid rgba(255,255,255,0.06); padding-bottom: 10px; z-index: 100;
        }
        .nav-btn {
            display: flex; flex-direction: column; align-items: center; gap: 3px;
            background: none; border: none; color: #555; cursor: pointer;
            padding: 6px 14px; font-size: 11px; font-weight: 600; transition: all 0.2s;
            font-family: 'Inter', sans-serif; position: relative;
        }
        .nav-btn.active { color: #FFD700; }
        .nav-btn.active::after {
            content: ''; position: absolute; top: -6px; width: 20px; height: 3px;
            background: #FFD700; border-radius: 2px; box-shadow: 0 0 10px #FFD700;
        }
        .nav-btn svg { width: 24px; height: 24px; }

        .toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(100px);
            padding: 12px 24px; border-radius: 14px; background: #FFD700; color: #000;
            font-weight: 800; font-size: 14px; opacity: 0; transition: all 0.4s;
            z-index: 1000; white-space: nowrap;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        #ai, #prime, #settings, #notif { display: none !important; }
    </style>
</head>
<body>
    <div class="app">
        <div class="status-bar">
            <span id="clock">03:02</span>
            <div style="display:flex;gap:6px;align-items:center;">
                <span style="font-size:10px;color:#00ff88;">● Online</span>
            </div>
        </div>

        <div class="app-bar">
            <div>
                <span class="app-title">Gold Signal Pro</span>
                <div class="app-subtitle">Professional Market Analysis</div>
            </div>
        </div>

        <div class="content">
            <!-- الأخبار -->
            <div class="news-ticker-bar" style="background: linear-gradient(90deg, rgba(255,50,50,0.08), rgba(255,215,0,0.05)); border-bottom: 2px solid rgba(255,215,0,0.3);">
                <div class="news-ticker-track" style="animation-duration: 35s; font-weight: 600; color: #fff;">
                    <span>🔴 HIGH IMPACT: 🇺🇸 US FOMC Interest Rate Decision - 19:00 UTC</span>
                    <span>🔴 HIGH IMPACT: 🇪🇺 EU ECB Press Conference - 12:45 UTC</span>
                    <span>🔴 HIGH IMPACT: 🇬🇧 UK BOE Monetary Policy Report - 11:00 UTC</span>
                </div>
            </div>

            <!-- أدوات السوق -->
            <div class="market-toolbar">
                <span class="market-label active" onclick="setMat('gold', this)">Gold</span>
                <span class="market-label" onclick="setMat('silver', this)">Silver</span>
                <span class="market-label" onclick="setMat('oil', this)">Oil</span>
                <input class="search-input" id="assetInput" placeholder="Enter asset (e.g. BTCUSD)">
                <button class="search-btn" onclick="searchAsset()">Search</button>
            </div>

            <!-- ===== المستطيل السحري (بياخد السعر من نفس مصدر الشارت) ===== -->
            <div class="price-box">
                <iframe id="tvPriceWidget" 
                    src="https://s.tradingview.com/embed-widget/ticker/?locale=en#%7B%22symbols%22%3A%5B%5B%22OANDA%3AXAUUSD%22%5D%5D%2C%22colorTheme%22%3A%22dark%22%2C%22isTransparent%22%3Atrue%2C%22width%22%3A%22100%25%22%2C%22height%22%3A%22100%25%22%2C%22locale%22%3A%22en%22%2C%22showSymbolLogo%22%3Afalse%2C%22showSymbolName%22%3Afalse%2C%22showPrice%22%3Atrue%2C%22showChange%22%3Atrue%7D" 
                    frameborder="0" 
                    allowtransparency="true" 
                    scrolling="no" 
                    style="width:100%; height:100%;">
                </iframe>
            </div>

            <!-- الشارت -->
            <div class="chart-box">
                <div class="chart-header">
                    <span class="chart-title" id="chartTitle">XAU/USD</span>
                    <div class="timeframes">
                        <button class="tf" onclick="setTF('15', this)">15m</button>
                        <button class="tf active" onclick="setTF('30', this)">30m</button>
                        <button class="tf" onclick="setTF('60', this)">1H</button>
                        <button class="tf" onclick="setTF('240', this)">4H</button>
                        <button class="tf" onclick="setTF('D', this)">D</button>
                    </div>
                </div>
                <div class="chart-area">
                    <iframe id="tvChart" src="https://s.tradingview.com/embed-widget/advanced-chart/?locale=en&symbol=OANDA%3AXAUUSD#%7B%22autosize%22%3Atrue%2C%22symbol%22%3A%22OANDA%3AXAUUSD%22%2C%22interval%22%3A%2230%22%2C%22timezone%22%3A%22Etc%2FUTC%22%2C%22theme%22%3A%22dark%22%2C%22style%22%3A%221%22%2C%22locale%22%3A%22en%22%2C%22allow_symbol_change%22%3Afalse%2C%22calendar%22%3Afalse%2C%22studies%22%3A%5B%7B%22id%22%3A%22MASimple%40tv-basicstudies%22%2C%22version%22%3A%2260%22%2C%22inputs%22%3A%7B%22length%22%3A50%7D%7D%5D%2C%22hide_top_toolbar%22%3Atrue%2C%22hide_side_toolbar%22%3Atrue%2C%22hide_legend%22%3Atrue%2C%22hide_volume%22%3Atrue%2C%22save_image%22%3Afalse%2C%22details%22%3Afalse%2C%22hotlist%22%3Afalse%2C%22stocktwits%22%3Afalse%2C%22headline%22%3Afalse%2C%22watchlist%22%3Afalse%2C%22compare_symbol%22%3Afalse%2C%22disabled_features%22%3A%5B%22use_localstorage_for_settings%22%2C%22header_symbol_search%22%2C%22header_resolutions%22%2C%22header_chart_type%22%2C%22header_compare%22%2C%22header_undo_redo%22%2C%22header_screenshot%22%2C%22header_settings%22%2C%22header_fullscreen_button%22%2C%22header_indicators%22%2C%22header_interval_dialog_button%22%2C%22show_interval_dialog_on_key_press%22%2C%22symbol_search_hot_key%22%2C%22study_dialog_search_control%22%2C%22display_market_status%22%2C%22control_bar%22%2C%22timeframes_toolbar%22%2C%22edit_buttons_in_legend%22%2C%22context_menus%22%2C%22border_around_the_chart%22%2C%22volume_force_overlay%22%2C%22legend_context_menu%22%2C%22items_favoriting%22%2C%22left_toolbar%22%2C%22go_to_date%22%2C%22header_saveload%22%2C%22save_shortcut%22%2C%22show_right_widgets_panel_by_default%22%2C%22show_object_tree%22%2C%22popup_hints%22%2C%22chart_crosshair_menu%22%2C%22chart_properties%22%2C%22compareOrAdd%22%2C%22insertIndicator%22%2C%22symbolSearch%22%2C%22changeInterval%22%2C%22drawingToolbarAction%22%2C%22stayInDrawingModeAction%22%2C%22hideAllMarks%22%2C%22showCountdown%22%2C%22showSymbolLabelsAction%22%2C%22showStudyLastValue%22%2C%22showStudyPlotNamesAction%22%2C%22paneRemoveAllStudiesDrawingTools%22%2C%22showSymbolInfoDialog%22%2C%22create_volume_indicator_by_default%22%2C%22legend_last_day_change%22%2C%22show_last_price_and_change_only_in_series_legend%22%2C%22hide_resolution_in_legend%22%2C%22hide_unresolved_symbols_in_legend%22%2C%22object_tree_legend_mode%22%2C%22main_series_scale_menu%22%2C%22source_selection_markers%22%2C%22mouse_wheel_scale%22%2C%22mouse_wheel_scroll%22%2C%22pinch_scale%22%2C%22pressed_mouse_move_scroll%22%2C%22horz_touch_drag_scroll%22%2C%22adaptive_logo%22%5D%2C%22enabled_features%22%3A%5B%5D%2C%22support_host%22%3A%22https%3A%2F%2Fwww.tradingview.com%22%7D" frameborder="0" allowtransparency="true" scrolling="no" allow="fullscreen"></iframe>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <button class="nav-btn active"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Home</span></button>
            <button class="nav-btn"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg><span>AI</span></button>
            <button class="nav-btn"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg><span>Prime</span></button>
            <button class="nav-btn"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.488.488 0 0 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58z"/></svg><span>Settings</span></button>
        </div>

        <div class="toast" id="toast">Message</div>
    </div>

    <script>
        // ==================== الحالة ====================
        let currentMat = 'gold';
        let currentTF = '30';
        const SYMBOLS = {
            gold: { symbol: 'OANDA:XAUUSD', pair: 'XAU/USD' },
            silver: { symbol: 'OANDA:XAGUSD', pair: 'XAG/USD' },
            oil: { symbol: 'TVC:USOIL', pair: 'WTI/USD' }
        };

        // ==================== الساعة ====================
        function updateClock() {
            const now = new Date();
            const h = now.getHours().toString().padStart(2, '0');
            const m = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').textContent = h + ':' + m;
        }

        // ==================== تغيير المادة ====================
        function setMat(mat, btn) {
            document.querySelectorAll('.market-label').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMat = mat;
            const info = SYMBOLS[mat];
            document.getElementById('chartTitle').textContent = info.pair;
            // تحديث البنر (نفس مصدر الشارت)
            updatePriceWidget(info.symbol);
            // تحديث الشارت
            loadChart(info.symbol);
            showToast('Switched to ' + info.pair);
        }

        // ==================== تحديث البنر (نفس مصدر الشارت) ====================
        function updatePriceWidget(symbol) {
            const iframe = document.getElementById('tvPriceWidget');
            if (!iframe) return;
            const base = 'https://s.tradingview.com/embed-widget/ticker/?locale=en#%7B%22symbols%22%3A%5B%5B%22';
            const mid = '%22%5D%5D%2C%22colorTheme%22%3A%22dark%22%2C%22isTransparent%22%3Atrue%2C%22width%22%3A%22100%25%22%2C%22height%22%3A%22100%25%22%2C%22locale%22%3A%22en%22%2C%22showSymbolLogo%22%3Afalse%2C%22showSymbolName%22%3Afalse%2C%22showPrice%22%3Atrue%2C%22showChange%22%3Atrue%7D';
            iframe.src = base + encodeURIComponent(symbol) + mid;
        }

        // ==================== تغيير الإطار الزمني ====================
        function setTF(tf, btn) {
            document.querySelectorAll('.tf').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentTF = tf;
            const sym = SYMBOLS[currentMat].symbol;
            loadChart(sym);
        }

        // ==================== تحميل الشارت ====================
        function loadChart(sym) {
            const chartIframe = document.getElementById('tvChart');
            if (!chartIframe) return;
            const intervalMap = { '15': '15', '30': '30', '60': '60', '240': '240', 'D': 'D' };
            const interval = intervalMap[currentTF] || '30';
            chartIframe.src = 'https://s.tradingview.com/embed-widget/advanced-chart/?locale=en&symbol=' + encodeURIComponent(sym) + '#%7B%22autosize%22%3Atrue%2C%22symbol%22%3A%22' + encodeURIComponent(sym) + '%22%2C%22interval%22%3A%22' + interval + '%22%2C%22timezone%22%3A%22Etc%2FUTC%22%2C%22theme%22%3A%22dark%22%2C%22style%22%3A%221%22%2C%22locale%22%3A%22en%22%2C%22allow_symbol_change%22%3Afalse%2C%22calendar%22%3Afalse%2C%22studies%22%3A%5B%7B%22id%22%3A%22MASimple%40tv-basicstudies%22%2C%22version%22%3A%2260%22%2C%22inputs%22%3A%7B%22length%22%3A50%7D%7D%5D%2C%22hide_top_toolbar%22%3Atrue%2C%22hide_side_toolbar%22%3Atrue%2C%22hide_legend%22%3Atrue%2C%22hide_volume%22%3Atrue%2C%22save_image%22%3Afalse%2C%22details%22%3Afalse%2C%22hotlist%22%3Afalse%2C%22stocktwits%22%3Afalse%2C%22headline%22%3Afalse%2C%22watchlist%22%3Afalse%2C%22compare_symbol%22%3Afalse%2C%22disabled_features%22%3A%5B%22use_localstorage_for_settings%22%2C%22header_symbol_search%22%2C%22header_resolutions%22%2C%22header_chart_type%22%2C%22header_compare%22%2C%22header_undo_redo%22%2C%22header_screenshot%22%2C%22header_settings%22%2C%22header_fullscreen_button%22%2C%22header_indicators%22%2C%22header_interval_dialog_button%22%2C%22show_interval_dialog_on_key_press%22%2C%22symbol_search_hot_key%22%2C%22study_dialog_search_control%22%2C%22display_market_status%22%2C%22control_bar%22%2C%22timeframes_toolbar%22%2C%22edit_buttons_in_legend%22%2C%22context_menus%22%2C%22border_around_the_chart%22%2C%22volume_force_overlay%22%2C%22legend_context_menu%22%2C%22items_favoriting%22%2C%22left_toolbar%22%2C%22go_to_date%22%2C%22header_saveload%22%2C%22save_shortcut%22%2C%22show_right_widgets_panel_by_default%22%2C%22show_object_tree%22%2C%22popup_hints%22%2C%22chart_crosshair_menu%22%2C%22chart_properties%22%2C%22compareOrAdd%22%2C%22insertIndicator%22%2C%22symbolSearch%22%2C%22changeInterval%22%2C%22drawingToolbarAction%22%2C%22stayInDrawingModeAction%22%2C%22hideAllMarks%22%2C%22showCountdown%22%2C%22showSymbolLabelsAction%22%2C%22showStudyLastValue%22%2C%22showStudyPlotNamesAction%22%2C%22paneRemoveAllStudiesDrawingTools%22%2C%22showSymbolInfoDialog%22%2C%22create_volume_indicator_by_default%22%2C%22legend_last_day_change%22%2C%22show_last_price_and_change_only_in_series_legend%22%2C%22hide_resolution_in_legend%22%2C%22hide_unresolved_symbols_in_legend%22%2C%22object_tree_legend_mode%22%2C%22main_series_scale_menu%22%2C%22source_selection_markers%22%2C%22mouse_wheel_scale%22%2C%22mouse_wheel_scroll%22%2C%22pinch_scale%22%2C%22pressed_mouse_move_scroll%22%2C%22horz_touch_drag_scroll%22%2C%22adaptive_logo%22%5D%2C%22enabled_features%22%3A%5B%5D%2C%22support_host%22%3A%22https%3A%2F%2Fwww.tradingview.com%22%7D';
        }

        // ==================== البحث ====================
        function searchAsset() {
            const input = document.getElementById('assetInput');
            const query = input.value.trim().toUpperCase();
            if (!query) { showToast('Please enter asset'); return; }

            let sym = query;
            if (!query.includes('/') && !query.includes(':')) {
                if (query.startsWith('XAU') || query.startsWith('XAG')) sym = 'OANDA:' + query;
                else if (query === 'OIL' || query === 'WTI') sym = 'TVC:USOIL';
                else if (query === 'BTC') sym = 'COINBASE:BTCUSD';
                else if (query === 'ETH') sym = 'COINBASE:ETHUSD';
                else sym = 'OANDA:' + query;
            }

            document.getElementById('chartTitle').textContent = query;
            // تحديث البنر والشارت
            updatePriceWidget(sym);
            loadChart(sym);
            document.querySelectorAll('.market-label').forEach(b => b.classList.remove('active'));
            showToast('🔍 Showing: ' + query);
            input.value = '';
        }

        // ==================== Toast ====================
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._timeout);
            t._timeout = setTimeout(() => t.classList.remove('show'), 3000);
        }

        // ==================== بدء ====================
        document.addEventListener('DOMContentLoaded', function() {
            updateClock();
            setInterval(updateClock, 1000);
        });
    </script>
</body>
</html>
